name: github-release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify public release candidate
        env:
          CI: true
        run: pnpm verify:release-candidate

      - name: Prepare GitHub release notes from changelog
        run: node tooling/release/prepare-github-release.mjs "${{ github.ref_name }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          --title "${{ github.ref_name }}"
          --notes-file tooling/release/github-release-notes.md
          tooling/release/release-candidate-summary.md#release-candidate-summary.md
