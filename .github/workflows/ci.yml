name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-pr-verification-scope:
    name: Resolve PR verification scope
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.resolve.outputs.mode }}
      reason: ${{ steps.resolve.outputs.reason }}
      filter_args: ${{ steps.resolve.outputs.filter_args }}
      package_names: ${{ steps.resolve.outputs.package_names }}
      test_filter_args: ${{ steps.resolve.outputs.test_filter_args }}
      test_package_names: ${{ steps.resolve.outputs.test_package_names }}
      test_paths: ${{ steps.resolve.outputs.test_paths }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve PR verification scope
        id: resolve
        run: node tooling/ci/detect-pr-verification-scope.mjs

  build-and-typecheck:
    name: Build and typecheck
    runs-on: ubuntu-latest
    needs:
      - resolve-pr-verification-scope

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (scoped PR)
        if: github.event_name == 'pull_request' && needs.resolve-pr-verification-scope.outputs.mode == 'scoped'
        run: pnpm -r --if-present ${{ needs.resolve-pr-verification-scope.outputs.filter_args }} run build

      - name: Build (full)
        if: github.event_name != 'pull_request' || needs.resolve-pr-verification-scope.outputs.mode != 'scoped'
        run: pnpm build

      - name: Typecheck (scoped PR)
        if: github.event_name == 'pull_request' && needs.resolve-pr-verification-scope.outputs.mode == 'scoped'
        run: pnpm -r --if-present ${{ needs.resolve-pr-verification-scope.outputs.filter_args }} run typecheck

      - name: Typecheck (full)
        if: github.event_name != 'pull_request' || needs.resolve-pr-verification-scope.outputs.mode != 'scoped'
        run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - resolve-pr-verification-scope

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test (scoped PR package scripts)
        if: github.event_name == 'pull_request' && needs.resolve-pr-verification-scope.outputs.mode == 'scoped' && needs.resolve-pr-verification-scope.outputs.test_package_names != ''
        run: pnpm -r --if-present ${{ needs.resolve-pr-verification-scope.outputs.test_filter_args }} run test

      - name: Test (scoped PR fallback paths)
        if: github.event_name == 'pull_request' && needs.resolve-pr-verification-scope.outputs.mode == 'scoped' && needs.resolve-pr-verification-scope.outputs.test_paths != ''
        run: pnpm vitest run ${{ needs.resolve-pr-verification-scope.outputs.test_paths }}

      - name: Test (full)
        if: github.event_name != 'pull_request' || needs.resolve-pr-verification-scope.outputs.mode != 'scoped'
        run: pnpm test

  official-web-runtime-adapter-portability:
    name: Official web runtime adapter portability (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter:
          - bun
          - deno
          - cloudflare-workers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run official web runtime adapter portability suite
        run: pnpm vitest run packages/testing/src/portability/web-runtime-adapter-portability.test.ts --testNamePattern "${{ matrix.adapter }} web runtime adapter portability"

  verify-platform-consistency-governance:
    name: Verify platform consistency governance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify platform consistency governance
        run: pnpm verify:platform-consistency-governance

  verify-release-readiness:
    name: Verify release readiness
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release readiness
        run: pnpm verify:release-readiness

  verify:
    name: Verify
    if: github.event_name == 'pull_request'
    needs:
      - build-and-typecheck
      - lint
      - test
      - official-web-runtime-adapter-portability
      - verify-platform-consistency-governance
      - resolve-pr-verification-scope
    runs-on: ubuntu-latest

    steps:
      - name: PR verification gate passed
        run: |
          echo "PR verification jobs passed."
          echo "verification mode: ${{ needs.resolve-pr-verification-scope.outputs.mode }}"
          echo "scope reason: ${{ needs.resolve-pr-verification-scope.outputs.reason }}"
          echo "scoped packages: ${{ needs.resolve-pr-verification-scope.outputs.package_names }}"

  release-verify:
    name: Release verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build-and-typecheck
      - lint
      - test
      - verify-platform-consistency-governance
      - verify-release-readiness
    runs-on: ubuntu-latest

    steps:
      - name: Main branch release-grade gate passed
        run: echo "Main branch release-grade verification jobs passed."
