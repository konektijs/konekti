name: Bug Report
description: Report a bug in the fluo framework or CLI
labels: ["bug", "priority:p2"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: |
        Steps to reproduce the behavior. 
        If possible, provide a minimal repository or code snippet.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: fluo Version
      description: e.g. v1.2.3, or @latest
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Node version, OS, pnpm version, etc.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the problem here.
